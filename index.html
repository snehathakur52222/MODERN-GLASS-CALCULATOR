<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Modern Glass Calculator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="calculator">

        <h2>✨ Modern Calculator</h2>

        <input
            type="text"
            id="display"
            placeholder="0"
            readonly
        >

        <div class="buttons">

            <!-- First Row -->
            <button class="clear" onclick="clearDisplay()">
                <i class="fa-solid fa-trash"></i>
            </button>

            <button class="operator" onclick="deleteLast()">
                <i class="fa-solid fa-delete-left"></i>
            </button>

            <button class="operator" onclick="appendValue('%')">
                %
            </button>

            <button class="operator" onclick="appendValue('/')">
                <i class="fa-solid fa-divide"></i>
            </button>

            <!-- Second Row -->
            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>

            <button class="operator" onclick="appendValue('*')">
                <i class="fa-solid fa-xmark"></i>
            </button>

            <!-- Third Row -->
            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>

            <button class="operator" onclick="appendValue('-')">
                <i class="fa-solid fa-minus"></i>
            </button>

            <!-- Fourth Row -->
            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>

            <button class="operator" onclick="appendValue('+')">
                <i class="fa-solid fa-plus"></i>
            </button>

            <!-- Fifth Row -->
            <button class="zero" onclick="appendValue('0')">
                0
            </button>

            <button onclick="appendValue('.')">
                .
            </button>

            <button class="equal" onclick="calculate()">
                =
            </button>

        </div>

    </div>

</div>

<!-- JavaScript -->
<script src="script.js"></script>

</body>
</html>
